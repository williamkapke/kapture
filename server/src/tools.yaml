# Common definitions
_common:
  tabId: &tabId
    type: string
    description: Target tab ID

  selectorAndXpath: &selectorAndXpath
    selector:
      type: string
      description: The CSS selector to find a target Element for the action (uses first matching element)
    xpath:
      type: string
      description: An XPath expression to find a target Element for the action (alternative to selector, uses first matching element)

  oneOfSelectorOrXpath: &oneOfSelectorOrXpath
    oneOf:
      - required: [selector]
      - required: [xpath]

tools:
  list_tabs:
    description: List all connected browser tabs

  tab_detail:
    description: Get detailed information about a specific tab
    required: [tabId]
    properties:
      tabId: *tabId

  navigate:
    description: Navigate browser tab to specified URL
    required: [tabId, url]
    properties:
      tabId: *tabId
      url:
        type: string
        format: url
        description: URL to navigate to
      timeout:
        type: number
        description: Navigation timeout in milliseconds
        default: 30000

  back:
    description: Navigate back in browser history
    required: [tabId]
    properties:
      tabId: *tabId

  forward:
    description: Navigate forward in browser history
    required: [tabId]
    properties:
      tabId: *tabId

  click:
    description: >-
      Click on a page element using CSS selector or XPath (first match, its
      unique selector is returned), or at a viewport coordinate by passing x
      and y instead. Coordinates are CSS pixels relative to the viewport -
      NOT screenshot pixels; divide screenshot positions by the
      screenshot-to-viewport scale. Coordinate clicks hit whatever is at that
      point, including content inside iframes that selectors cannot reach.
    required: [tabId]
    properties:
      tabId: *tabId
      <<: *selectorAndXpath
      x:
        type: number
        description: Viewport x coordinate in CSS pixels (pair with y; alternative to selector/xpath)
      y:
        type: number
        description: Viewport y coordinate in CSS pixels (pair with x; alternative to selector/xpath)
    <<: *oneOfSelectorOrXpath

  hover:
    description: >-
      Hover over a page element using CSS selector or XPath (first match, its
      unique selector is returned), or at a viewport coordinate by passing x
      and y instead. Coordinates are CSS pixels relative to the viewport -
      NOT screenshot pixels; divide screenshot positions by the
      screenshot-to-viewport scale. Coordinate hovers hit whatever is at that
      point, including content inside iframes that selectors cannot reach.
    required: [tabId]
    <<: *oneOfSelectorOrXpath
    properties:
      tabId: *tabId
      <<: *selectorAndXpath
      x:
        type: number
        description: Viewport x coordinate in CSS pixels (pair with y; alternative to selector/xpath)
      y:
        type: number
        description: Viewport y coordinate in CSS pixels (pair with x; alternative to selector/xpath)

  focus:
    description: >-
      Set focus on a page element using CSS selector or XPath. Only the first 
      matching element will be focused. Returns the unique selector of the 
      focused element. Useful for form inputs, buttons, and other interactive 
      elements.
    required: [tabId]
    <<: *oneOfSelectorOrXpath
    properties:
      tabId: *tabId
      <<: *selectorAndXpath

  blur:
    description: >-
      Remove focus (blur) from a page element using CSS selector or XPath. Only 
      the first matching element will be blurred. Returns the unique selector of 
      the blurred element. Also removes focus from document.activeElement if 
      different.
    required: [tabId]
    <<: *oneOfSelectorOrXpath
    properties:
      tabId: *tabId
      <<: *selectorAndXpath

  fill:
    description: >-
      Fill an input field with a value using CSS selector or XPath. Only the 
      first matching element will be filled. Returns the unique selector of 
      the filled element.
    required: [tabId, value]
    <<: *oneOfSelectorOrXpath
    properties:
      tabId: *tabId
      <<: *selectorAndXpath
      value:
        type: string
        description: Value to fill in the input

  select:
    description: >-
      Select an option from an HTML <select> dropdown element using CSS 
      selector or XPath. Only the first matching select element will be used. 
      Returns the unique selector of the select element. Note: Only works with 
      native HTML select elements, not custom dropdowns.
    required: [tabId, value]
    <<: *oneOfSelectorOrXpath
    properties:
      tabId: *tabId
      <<: *selectorAndXpath
      value:
        type: string
        description: Value attribute of the option to select

  keypress:
    description: >-
      Send a keypress event to the current tab or a specific element. Uses 
      Chrome DevTools Protocol for proper key simulation including navigation 
      keys (Tab, PageDown, arrows) and function keys. When delay > 500ms, 
      automatically simulates holding the key down with repeated events.
    required: [tabId, key]
    properties:
      tabId: *tabId
      key:
        type: string
        description: >-
          The key combination to press. Can be a single key (e.g., "a", 
          "Enter", "Tab", "PageDown", "F5") or a combination with modifiers 
          (e.g., "Control+a", "Shift+Tab", "Alt+F4", "Meta+Shift+p"). 
          Special keys: Enter, Tab, Delete, Backspace, Escape, Space, 
          ArrowUp/Down/Left/Right, PageUp/Down, Home, End, Insert, F1-F12. 
          Modifiers: Control (or Ctrl), Shift, Alt, Meta (or Cmd on Mac)
      <<: *selectorAndXpath
      delay:
        type: number
        description: >-
          Delay in milliseconds between keydown and keyup events. Default: 
          50ms. Range: 0-60000ms. When > 500ms, simulates holding the key 
          down with auto-repeat
        default: 50
        minimum: 0
        maximum: 60000
      timeout:
        type: number
        description: >-
          Command timeout in milliseconds. Default: 5000ms. Automatically 
          extended for long delays
        minimum: 1000
        maximum: 70000

  type:
    description: >-
      Type a string as individual keystrokes (real keydown/keyup/input events
      per character) via Chrome DevTools Protocol. Unlike `fill`, this works on
      "fake" inputs and rich editors that ignore element.value and react to
      actual keypresses (autocomplete, input masks, contenteditable). Optionally
      focuses a target element first (CSS selector or XPath); otherwise types
      into the currently focused element. Types at the cursor (does not clear -
      use the `clear` tool first to replace existing content).
    required: [tabId, text]
    properties:
      tabId: *tabId
      text:
        type: string
        description: The text to type, character by character
      <<: *selectorAndXpath
      delay:
        type: number
        description: >-
          Delay in milliseconds between each keystroke. Default 0. Increase for
          sites that debounce or throttle input.
        default: 0
        minimum: 0
        maximum: 5000
      timeout:
        type: number
        description: >-
          Command timeout in milliseconds. Auto-extended based on text length
          and delay when not specified.
        minimum: 1000
        maximum: 120000

  insertText:
    description: >-
      Insert a whole string at once into the focused element via Chrome DevTools
      Protocol (like an IME commit or paste - fires input/beforeinput but no
      per-key events). Best for large blocks of text and editors that accept
      inserted text (e.g. Google Docs). For inputs that require real keystrokes,
      use `type` instead. Optionally focuses a target element first (CSS selector
      or XPath); otherwise inserts at the currently focused element's cursor.
    required: [tabId, text]
    properties:
      tabId: *tabId
      text:
        type: string
        description: The text to insert
      <<: *selectorAndXpath

  clear:
    description: >-
      Clear a text field by selecting all of its contents and deleting them with
      real key events (Ctrl/Cmd+A then Backspace) via Chrome DevTools Protocol.
      Works on inputs, textareas, contenteditable, and "fake" inputs that ignore
      element.value. Optionally focuses a target element first (CSS selector or
      XPath); otherwise clears the currently focused element.
    required: [tabId]
    properties:
      tabId: *tabId
      <<: *selectorAndXpath

  screenshot:
    description: >-
      Capture a screenshot of the page or specific element using CSS selector
      or XPath. When a selector/xpath is provided, only the first matching 
      element will be captured. Returns the unique selector of the captured 
      element if applicable.
    required: [tabId]
    properties:
      tabId: *tabId
      <<: *selectorAndXpath
      scale:
        type: number
        description: Scale factor (0.1-1.0) to reduce screenshot size (default 0.3)
        default: 0.3
        minimum: 0.1
        maximum: 1
      format:
        type: string
        description: Image format (default webp for best compression)
        default: webp
        enum: [webp, jpeg, png]
      quality:
        type: number
        description: Compression quality for webp/jpeg (0.1-1.0, default 0.85)
        default: 0.85
        minimum: 0.1
        maximum: 1


  dom:
    description: >-
      Get outerHTML of the body or a specific element using CSS selector or 
      XPath. When a selector/xpath is provided, only the first matching 
      element will be used. Returns the unique selector of the element if 
      applicable.
    required: [tabId]
    properties:
      tabId: *tabId
      <<: *selectorAndXpath

  elements:
    description: >-
      Query all elements matching a CSS selector or XPath and get detailed 
      information about each element. Use the visible parameter to filter 
      elements by visibility status.
    required: [tabId]
    <<: *oneOfSelectorOrXpath
    properties:
      tabId: *tabId
      <<: *selectorAndXpath
      visible:
        type: string
        description: Filter elements by visibility (true = only visible, false = only hidden, all = all elements)
        default: "all"
        enum: ["true", "false", "all"]

  scroll:
    description: >-
      Scroll the page or an element. Selector/xpath alone brings the element
      into view (centered vertically, nested scroll containers handled). x
      and/or y alone scrolls the document to that absolute coordinate. BOTH
      together scrolls within the element itself to that offset (e.g. an
      inner pane or infinite list) and returns the clamped landing position
      as elementScroll. A missing axis keeps the current offset (e.g. y:0
      jumps to the top). Returns the resulting scroll position.
    required: [tabId]
    properties:
      tabId: *tabId
      <<: *selectorAndXpath
      x:
        type: number
        description: Absolute horizontal scroll position in pixels (document coordinates, or within the element when a selector/xpath is given)
      y:
        type: number
        description: Absolute vertical scroll position in pixels (document coordinates, or within the element when a selector/xpath is given)

  dialog:
    description: >-
      Respond to a JavaScript dialog (alert, confirm, prompt, or
      onbeforeunload) that is blocking the tab. A dialog freezes the page -
      while one is open every other command fails fast with DIALOG_OPEN, and
      the command that triggered it returns a `dialog` field with its type
      and message. accept true presses OK/Leave, false presses Cancel/Stay
      (alerts close either way). For prompt() dialogs, text supplies the
      value to type before accepting.
    required: [tabId, accept]
    properties:
      tabId: *tabId
      accept:
        type: boolean
        description: true presses OK/Leave; false presses Cancel/Stay (alerts close either way)
      text:
        type: string
        description: Text to enter into a prompt() dialog before accepting

  elementsFromPoint:
    description: Get information about all elements at a specific coordinate in the viewport
    required: [tabId, x, y]
    properties:
      tabId: *tabId
      x:
        type: number
        description: X coordinate relative to the viewport
      y:
        type: number
        description: Y coordinate relative to the viewport

  console_logs:
    description: >-
      Get the browser tab's console contents - what you would see in the
      DevTools console, including console messages, uncaught exceptions, and
      browser-generated entries (network errors, violations, etc.). Returns
      newest first.
    required: [tabId]
    properties:
      tabId: *tabId
      before:
        type: string
        description: Get logs before this timestamp (for pagination)
      limit:
        type: integer
        description: Maximum number of logs to return
        default: 100
        minimum: 1
        maximum: 500
      level:
        type: string
        description: Filter logs by level (log, info, warn, error, debug, trace, table, group, groupCollapsed, groupEnd)
        enum: ["log", "info", "warn", "error", "debug", "trace", "table", "group", "groupCollapsed", "groupEnd"]

  watch_console:
    description: >-
      Watch a browser tab's console in real time. Collects console messages,
      uncaught exceptions, and browser-generated entries as they happen for
      the timeout duration, then returns them in chronological order. Useful
      for observing the result of an action (e.g. click something, then watch
      what the page logs).
    required: [tabId, timeout]
    properties:
      tabId: *tabId
      timeout:
        type: number
        description: How long to watch, in milliseconds
        minimum: 1000
        maximum: 60000

  network_monitor:
    description: >-
      Turn network monitoring on or off for a browser tab. While on, Kapture stays
      attached to the tab and records every network request (url, method, status,
      type, size, timing) into a buffer you read with `network_requests`; fetch an
      individual request/response body with `network_body`. The capture has NO
      history - it only sees requests that happen while monitoring is on, so
      enable it BEFORE the traffic you want to observe (e.g. before navigating or
      clicking). Enable is idempotent per caller: each watching client is tracked
      by identity, monitoring stays on until every watcher has disabled (or
      `force` is used), and a client's watchers are released automatically when
      it disconnects. The request buffer is cleared when monitoring fully stops.
      Extension 1.1.0+.
    required: [tabId, enabled]
    properties:
      tabId: *tabId
      enabled:
        type: boolean
        description: true to start monitoring, false to stop
      clientId:
        type: string
        description: >-
          Watcher identity for HTTP callers - pass the same value to enable and
          disable. MCP clients are identified automatically and should omit this.
          HTTP calls without one share a single 'http' identity.
      force:
        type: boolean
        description: With enabled:false, remove ALL watchers and stop monitoring unconditionally

  network_requests:
    description: >-
      List the network requests captured since monitoring was enabled. Returns
      lean metadata per request (plus `hasPostData` when the request carried a
      payload) and a `requestId` to pass to `network_body`. Each request has a
      monotonic `seq`; poll incrementally by passing the `cursor` from the
      previous call as `since` to get only newer requests. Returns
      monitoring:false (and an empty list) if monitoring is not currently on.
    required: [tabId]
    properties:
      tabId: *tabId
      since:
        type: number
        description: Only return requests with a seq greater than this cursor (use the `cursor` from a prior call). Omit for all buffered requests.
        minimum: 0
      limit:
        type: number
        description: Maximum number of requests to return
        default: 50
        minimum: 1
        maximum: 1000

  network_body:
    description: >-
      Fetch the bodies for a single captured request by `requestId` (from
      network_requests). Monitoring must be on. Returns the request payload as
      `requestBody` (when the request had one - see `hasPostData` in the list)
      and the response body as `body`, plus the request/response headers. The
      response body is read live from the browser, so it may be unavailable -
      evicted, from a page that has since navigated away, or a streaming
      (text/event-stream) response that CDP cannot read - which returns a
      `bodyError` instead. Binary bodies come back base64-encoded
      (base64Encoded:true).
    required: [tabId, requestId]
    properties:
      tabId: *tabId
      requestId:
        type: string
        description: The requestId from a network_requests entry
      maxBytes:
        type: number
        description: Maximum body bytes to return inline; longer bodies are truncated (bodyTruncated:true) while `size` still reports the full length
        default: 65536
        minimum: 1024
        maximum: 1048576

  evaluate:
    description: >-
      Execute JavaScript in the page and return the result. The code runs in
      the page's main world via Chrome DevTools Protocol; the result must be
      JSON-serializable. Promises are awaited. Only available when the user
      has enabled "Allow JavaScript Execution" for the tab in the Kapture
      extension. Prefer the purpose-built tools (click, fill, dom, elements,
      etc.) - only use evaluate when no other tool can accomplish the task.
    required: [tabId, code]
    properties:
      tabId: *tabId
      code:
        type: string
        description: JavaScript source to evaluate in the page
      timeout:
        type: number
        description: Command timeout in milliseconds
        default: 5000
        minimum: 1000
        maximum: 60000

  compose:
    description: >-
      Run a sequence of commands against a single tab in one call. The script is
      one command per line in the form `<tool>?<query-string>` - a URL query
      string whose keys are exactly that tool's own parameters. URL-encode each
      value: spaces as %20 or +, and especially &, %, and newlines (%0A). For
      example, two lines: `fill?selector=%23q&value=tom%20%26%20jerry` then
      `wait?t=500`. Commands run in order and stop
      at the first failure (a command erroring or not finding its element). The
      whole script is validated first, so an invalid script runs nothing.
      Returns an array of the per-command responses in order; on failure the
      last entry holds the error. Eligible commands: navigate, back, forward,
      reload, click, hover, focus, blur, fill, type, insertText, clear, select,
      keypress, scroll - plus `wait?t=<ms>` to pause between steps. The FINAL
      command may additionally be a data-returning read - screenshot, dom,
      elements, elementsFromPoint, console_logs, or watch_console - to verify
      the outcome in the same call (e.g. click then screenshot, or fill then
      console_logs). Data reads anywhere else, lifecycle (new_tab, close,
      show), and evaluate commands are not eligible.
    required: [tabId, script]
    properties:
      tabId: *tabId
      script:
        type: string
        description: One command per line, each as `<tool>?<query-string>`

  new_tab:
    description: >-
      Opens a new browser tab with the Kapture MCP usage documentation page. 
      The page will automatically connect to the Kapture server. Returns the 
      tab ID of the newly opened tab once it connects.
    properties:
      browser:
        type: string
        description: >-
          Optional browser to use. Supported values: chrome, edge, brave, opera, vivaldi.
          If not specified, uses the system default browser.
        enum: ["chrome", "edge", "brave", "opera", "vivaldi"]

  close:
    description: >-
      Closes a browser tab. The tab will be immediately closed and removed 
      from the connected tabs list.
    required: [tabId]
    properties:
      tabId: *tabId

  reload:
    description: >-
      Reloads the current page in the browser tab. Performs a standard page 
      reload similar to pressing F5 or clicking the browser's refresh button.
    required: [tabId]
    properties:
      tabId: *tabId

  show:
    description: >-
      Brings the browser tab to the front and focuses it. This will switch to 
      the tab's window and make it the active tab. Useful for directing user 
      attention to a specific tab when managing multiple browser tabs.
    required: [tabId]
    properties:
      tabId: *tabId
